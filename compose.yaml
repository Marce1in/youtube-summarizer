x-yt-gemini-common: &yt-gemini-common
  build: .
  image: trabalho-wagner-auto-redes:local
  ipc: host
  environment:
    DISPLAY: ":99"
    YT_GEMINI_BROWSER_PROFILE_DIR: /browser-profile
    YT_GEMINI_DATABASE_PATH: /data/app.sqlite3
    YT_GEMINI_DISPLAY: ":99"
    YT_GEMINI_LOG_PATH: /data/logs/automation.jsonl
    YT_GEMINI_MANAGE_DISPLAY: "true"
    YT_GEMINI_SCREENSHOT_DIR: /data/screenshots
    YT_GEMINI_BROWSER_CHANNEL: chrome
  volumes:
    - yt_gemini_data:/data
    - yt_gemini_browser_profile:/browser-profile

services:
  app:
    <<: *yt-gemini-common
    command: ["python", "-m", "yt_gemini", "--help"]

  auth:
    <<: *yt-gemini-common
    profiles: ["auth"]
    ports:
      - "127.0.0.1:6080:6080"
    command: ["python", "-m", "yt_gemini", "auth-server"]

volumes:
  yt_gemini_data:
  yt_gemini_browser_profile:
