x-youtube-summarizer-common: &youtube-summarizer-common
  build: .
  image: youtube-summarizer:local
  ipc: host
  environment:
    DISPLAY: ":99"
    YOUTUBE_SUMMARIZER_BROWSER_PROFILE_DIR: /browser-profile
    YOUTUBE_SUMMARIZER_DATABASE_PATH: /data/app.sqlite3
    YOUTUBE_SUMMARIZER_DISPLAY: ":99"
    YOUTUBE_SUMMARIZER_LOG_PATH: /data/logs/automation.jsonl
    YOUTUBE_SUMMARIZER_MANAGE_DISPLAY: "true"
    YOUTUBE_SUMMARIZER_SCREENSHOT_DIR: /data/screenshots
    YOUTUBE_SUMMARIZER_BROWSER_CHANNEL: chrome
  volumes:
    - youtube_summarizer_data:/data
    - youtube_summarizer_browser_profile:/browser-profile

services:
  app:
    <<: *youtube-summarizer-common
    command: ["youtube-summarizer", "--help"]

  auth:
    <<: *youtube-summarizer-common
    profiles: ["auth"]
    ports:
      - "127.0.0.1:6080:6080"
    command: ["youtube-summarizer", "auth-server"]

volumes:
  youtube_summarizer_data:
  youtube_summarizer_browser_profile:
